name: Social Automation

on:
  schedule:
    - cron: '15 4 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'content/**'
      - 'lib/marketing/**'
      - 'scripts/generate-social-automation.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/social-automation.yml'
    paths-ignore:
      - 'content/generated/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate social automation snapshot
        run: npm run social:generate

      - name: Commit generated snapshot
        run: |
          if git diff --quiet -- content/generated/social-automation.json; then
            echo "No snapshot changes."
            exit 0
          fi
          git config user.name "social-automation-bot"
          git config user.email "social-automation-bot@users.noreply.github.com"
          git add content/generated/social-automation.json
          git commit -m "chore: refresh social automation"
          git push
