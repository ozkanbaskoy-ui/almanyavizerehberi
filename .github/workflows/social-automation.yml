name: Social Automation

on:
  schedule:
    - cron: '15 4 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'content/**'
      - 'lib/marketing/**'
      - 'scripts/generate-social-automation.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/social-automation.yml'
    paths-ignore:
      - 'content/generated/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate social automation snapshot
        run: npm run social:generate

      - name: Publish social automation
        env:
          SOCIAL_DRY_RUN: ${{ vars.SOCIAL_DRY_RUN }}
          SOCIAL_FORCE_PUBLISH: ${{ vars.SOCIAL_FORCE_PUBLISH }}
          SOCIAL_META_ACCESS_TOKEN: ${{ secrets.SOCIAL_META_ACCESS_TOKEN }}
          SOCIAL_META_PAGE_ID: ${{ vars.SOCIAL_META_PAGE_ID }}
          SOCIAL_FACEBOOK_PAGE_ID: ${{ vars.SOCIAL_FACEBOOK_PAGE_ID }}
          SOCIAL_FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.SOCIAL_FACEBOOK_PAGE_ACCESS_TOKEN }}
          SOCIAL_INSTAGRAM_USER_ID: ${{ vars.SOCIAL_INSTAGRAM_USER_ID }}
          SOCIAL_INSTAGRAM_ACCESS_TOKEN: ${{ secrets.SOCIAL_INSTAGRAM_ACCESS_TOKEN }}
          SOCIAL_TELEGRAM_BOT_TOKEN: ${{ secrets.SOCIAL_TELEGRAM_BOT_TOKEN }}
          SOCIAL_TELEGRAM_CHAT_ID: ${{ vars.SOCIAL_TELEGRAM_CHAT_ID }}
          SOCIAL_X_ACCESS_TOKEN: ${{ secrets.SOCIAL_X_ACCESS_TOKEN }}
          SOCIAL_X_BEARER_TOKEN: ${{ secrets.SOCIAL_X_BEARER_TOKEN }}
          SOCIAL_LINKEDIN_ACCESS_TOKEN: ${{ secrets.SOCIAL_LINKEDIN_ACCESS_TOKEN }}
          SOCIAL_LINKEDIN_AUTHOR_URN: ${{ vars.SOCIAL_LINKEDIN_AUTHOR_URN }}
        run: npm run social:publish

      - name: Commit generated snapshot
        run: |
          if git diff --quiet -- content/generated/social-automation.json content/generated/social-publish-state.json; then
            echo "No snapshot changes."
            exit 0
          fi
          git config user.name "social-automation-bot"
          git config user.email "social-automation-bot@users.noreply.github.com"
          git add content/generated/social-automation.json content/generated/social-publish-state.json
          git commit -m "chore: refresh social automation"
          git push
